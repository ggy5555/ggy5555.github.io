<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brain-Structured Research Archive</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Roboto, "Apple SD Gothic Neo", sans-serif;
      background: linear-gradient(180deg, #f5f7fb 0%, #eef2f7 100%);
      text-align: center;
      color: #1f2937;
      min-height: 100vh;
    }

    .page {
      max-width: 1000px;
      margin: 0 auto;
      padding: 60px 20px;
    }

    .hero h1 {
      margin: 0;
      font-size: 2.5rem;
      font-weight: 800;
    }

    .brain-container {
      width: 850px;
      height: 550px;
      margin: 60px auto;
      position: relative;
    }

    .lobe {
      position: absolute;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-weight: 800;
      color: #111827;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: inset 0 0 30px rgba(255,255,255,0.3), 0 10px 20px rgba(0,0,0,0.1);
      text-align: center;
    }

    /* 툴팁 설정 */
    .lobe::after {
      content: attr(data-tooltip);
      position: absolute;
      bottom: 110%;
      left: 50%;
      transform: translateX(-50%) scale(0.9);
      width: 220px;
      padding: 12px;
      background: rgba(31, 41, 55, 0.95);
      color: #fff;
      font-size: 0.85rem;
      font-weight: 400;
      border-radius: 8px;
      visibility: hidden;
      opacity: 0;
      transition: all 0.2s ease;
      z-index: 100;
      pointer-events: none;
      line-height: 1.5;
      box-shadow: 0 10px 15px rgba(0,0,0,0.2);
    }

    .lobe:hover::after {
      visibility: visible;
      opacity: 1;
      transform: translateX(-50%) scale(1);
    }

    .lobe span {
      display: block;
      margin-top: 5px;
      font-size: 0.9rem;
      font-weight: 600;
      opacity: 0.8;
    }

    .lobe:hover {
      transform: scale(1.03) translateY(-5px);
      filter: brightness(1.05);
      z-index: 50 !important;
    }

    /* 각 영역별 위치 및 모양 (해부학적 비율 반영) */
    .frontal {
      width: 390px;
      height: 350px;
      left: 20px;
      top: 50px;
      background: linear-gradient(145deg, #efb2d2, #dc94be);
      border-radius: 50% 50% 40% 60% / 65% 45% 45% 55%;
      z-index: 10;
    }

    .parietal {
      width: 320px;
      height: 250px;
      left: 360px;
      top: 30px;
      background: linear-gradient(145deg, #b6bdf5, #94a0e8);
      border-radius: 40% 60% 40% 60% / 40% 70% 30% 60%;
      z-index: 5;
    }

    .temporal {
      width: 350px;
      height: 200px;
      left: 260px;
      top: 260px;
      background: linear-gradient(145deg, #b9d1ee, #96b7e2);
      border-radius: 30% 70% 60% 40% / 40% 40% 70% 60%;
      z-index: 15;
    }

    .occipital {
      width: 200px;
      height: 180px;
      left: 600px;
      top: 200px;
      background: linear-gradient(145deg, #f3db73, #e9ca4d);
      border-radius: 30% 70% 70% 30% / 50% 50% 70% 50%;
      z-index: 2;
    }

    .cerebellum {
      width: 190px;
      height: 120px;
      left: 550px;
      top: 370px;
      background: linear-gradient(145deg, #d1d5db, #9ca3af);
      border-radius: 60% 40% 50% 50% / 50% 50% 60% 40%;
      transform: rotate(-10deg);
      z-index: 1;
    }

    .legend {
      margin-top: 40px;
      color: #9ca3af;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="hero">
      <h1>🧠 Brain-Structured Research Archive</h1>
      <p>마우스를 올려 각 영역의 기능을 확인하세요</p>
    </div>

    <div class="brain-container">
      <div class="lobe frontal" 
           data-tooltip="의사결정, 계획 수립, 감정 조절 및 실행 기능 담당. 전전두피질(PFC)과 보충운동구역(SMA) 포함."
           onclick="location.href='frontal.html'">
        Frontal Lobe
        <span>전두엽</span>
      </div>

      <div class="lobe parietal" 
           data-tooltip="감각 정보의 통합, 공간 지각 및 수리적 사고 담당. 일차 체감각 피질(S1) 위치."
           onclick="location.href='parietal.html'">
        Parietal Lobe
        <span>두정엽</span>
      </div>

      <div class="lobe temporal" 
           data-tooltip="언어 이해(Wernicke's area), 청각 처리 및 장기 기억 형성 담당."
           onclick="location.href='temporal.html'">
        Temporal Lobe
        <span>측두엽</span>
      </div>

      <div class="lobe occipital" 
           data-tooltip="시각 정보의 수용 및 해석 담당. 일차 시각 피질(V1)과 시각 연합 영역 위치."
           onclick="location.href='occipital.html'">
        Occipital Lobe
        <span>후두엽</span>
      </div>

      <div class="lobe cerebellum" 
           data-tooltip="정교한 운동 조절, 평형 감각 유지 및 운동 학습 담당."
           onclick="location.href='cerebellum.html'">
        Cerebellum
        <span>소뇌</span>
      </div>
    </div>

    <div class="legend">
      * 각 영역을 클릭하면 해당 주제의 세부 연구 데이터베이스로 이동합니다.
    </div>
  </div>
</body>
</html>
