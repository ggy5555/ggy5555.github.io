<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Brain-Structured Research Archive</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: linear-gradient(180deg, #f5f7fb 0%, #eef2f7 100%);
      text-align: center;
      color: #1f2937;
    }

    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 48px 20px 64px;
    }

    .hero h1 {
      margin: 0;
      font-size: 2.4rem;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .hero p {
      margin: 12px 0 0;
      color: #4b5563;
      font-size: 1rem;
    }

    .brain {
      width: 660px;
      height: 420px;
      margin: 70px auto 0;
      position: relative;
    }

    .lobe {
      position: absolute;
      width: 190px;
      height: 150px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-weight: 800;
      font-size: 1rem;
      color: #111827;
      cursor: pointer;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      border-radius: 58% 42% 52% 48% / 46% 58% 42% 54%;
      box-shadow: inset 0 0 30px rgba(255,255,255,0.28);
    }

    .lobe span {
      display: block;
      margin-top: 10px;
      font-size: 14px;
      font-weight: 600;
    }

    .lobe:hover {
      transform: scale(1.07);
      box-shadow: 0 10px 24px rgba(0,0,0,0.12), inset 0 0 30px rgba(255,255,255,0.35);
    }

    .frontal {
      background: #f9a8d4;
      left: 95px;
      top: 118px;
    }

    .parietal {
      background: #a5b4fc;
      left: 280px;
      top: 30px;
      width: 205px;
      height: 170px;
    }

    .temporal {
      background: #93c5fd;
      left: 295px;
      top: 210px;
      width: 205px;
      height: 140px;
    }

    .occipital {
      background: #fde68a;
      left: 545px;
      top: 125px;
      width: 170px;
      height: 145px;
    }

    .legend {
      margin-top: 10px;
      color: #6b7280;
      font-size: 0.95rem;
    }

    @media (max-width: 760px) {
      .brain {
        width: 92vw;
        height: 62vw;
        max-height: 420px;
      }

      .lobe {
        font-size: 0.9rem;
      }

      .lobe span {
        font-size: 12px;
      }

      .frontal {
        left: 8%;
        top: 28%;
        width: 28%;
        height: 34%;
      }

      .parietal {
        left: 34%;
        top: 7%;
        width: 31%;
        height: 38%;
      }

      .temporal {
        left: 36%;
        top: 50%;
        width: 31%;
        height: 28%;
      }

      .occipital {
        left: 72%;
        top: 30%;
        width: 24%;
        height: 30%;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="hero">
      <h1>🧠 Brain-Structured Research Archive</h1>
      <p>뇌 기능을 기준으로 정리한 연구 아카이브</p>
    </div>

    <div class="brain">
      <div class="lobe frontal" onclick="location.href='frontal.html'">
        Frontal Lobe
        <span>전두엽</span>
      </div>

      <div class="lobe parietal" onclick="location.href='parietal.html'">
        Parietal Lobe
        <span>두정엽</span>
      </div>

      <div class="lobe temporal" onclick="location.href='temporal.html'">
        Temporal Lobe
        <span>측두엽</span>
      </div>

      <div class="lobe occipital" onclick="location.href='occipital.html'">
        Occipital Lobe
        <span>후두엽</span>
      </div>
    </div>

    <div class="legend">
      각 영역을 클릭하면 해당 연구 페이지로 이동합니다.
    </div>
  </div>
</body>
</html>
