<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brain-Structured Research Archive</title>

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Roboto, "Apple SD Gothic Neo", sans-serif;
      background: linear-gradient(180deg, #f8fafc 0%, #eef3f9 100%);
      text-align: center;
      color: #111827;
      min-height: 100vh;
    }

    .top-nav {
      width: 100%;
      height: 72px;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(16px);
      position: sticky;
      top: 0;
      z-index: 999;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 34px;
      box-sizing: border-box;
      border-bottom: 1px solid rgba(209, 213, 219, 0.8);
      box-shadow: 0 5px 18px rgba(15, 23, 42, 0.06);
    }

    .nav-logo {
      font-size: 1.25rem;
      font-weight: 900;
      color: #111827;
      white-space: nowrap;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 34px;
    }

    .nav-links a {
      position: relative;
      text-decoration: none;
      color: #111827;
      font-size: 0.95rem;
      font-weight: 700;
      padding: 27px 0 24px;
      transition: 0.2s;
      white-space: nowrap;
    }

    .nav-links a:hover {
      color: #4f46e5;
    }

    .nav-links a.active {
      color: #4f46e5;
    }

    .nav-links a.active::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 4px;
      background: #4f46e5;
      border-radius: 999px 999px 0 0;
    }

    .page {
      max-width: 1250px;
      margin: 0 auto;
      padding: 88px 20px 40px;
    }

    .hero h1 {
      margin: 0;
      font-size: 3.25rem;
      font-weight: 900;
      letter-spacing: -1.6px;
      color: #111827;
    }

    .hero p {
      color: #6b7280;
      margin-top: 18px;
      font-size: 1.18rem;
      font-weight: 500;
    }

    .brain-container {
      width: 1050px;
      height: 760px;
      margin: 70px auto 0;
      position: relative;
    }

    .lobe {
      position: absolute;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-weight: 900;
      color: #111827;
      cursor: pointer;
      transition: 0.25s ease;
      text-align: center;
      font-size: 1.45rem;
      box-shadow:
        inset 0 0 35px rgba(255,255,255,0.42),
        inset 0 -18px 30px rgba(0,0,0,0.05),
        0 14px 28px rgba(15,23,42,0.12);
    }

    .lobe span {
      display: block;
      margin-top: 10px;
      font-size: 1.05rem;
      font-weight: 800;
      opacity: 0.9;
    }

    .lobe:hover {
      transform: scale(1.025) translateY(-4px);
      filter: brightness(1.04);
      z-index: 80 !important;
    }

    .lobe::after {
      content: attr(data-tooltip);
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: 245px;
      padding: 15px 16px;
      background: rgba(31, 41, 55, 0.96);
      color: #fff;
      font-size: 0.9rem;
      font-weight: 600;
      border-radius: 7px;
      visibility: visible;
      opacity: 1;
      z-index: 200;
      pointer-events: none;
      line-height: 1.65;
      box-shadow: 0 12px 22px rgba(0,0,0,0.22);
      white-space: normal;
    }

    .lobe::before {
      content: "";
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      z-index: 201;
      pointer-events: none;
    }

    .frontal {
      width: 470px;
      height: 410px;
      left: 15px;
      top: 120px;
      background: linear-gradient(145deg, #f5a8c9, #e889b8);
      border-radius: 55% 45% 42% 58% / 60% 42% 52% 48%;
      z-index: 10;
    }

    .frontal::after {
      bottom: 101%;
    }

    .frontal::before {
      bottom: 96%;
      border-left: 15px solid transparent;
      border-right: 15px solid transparent;
      border-top: 15px solid rgba(31, 41, 55, 0.96);
    }

    .parietal {
      width: 410px;
      height: 310px;
      left: 430px;
      top: 115px;
      background: linear-gradient(145deg, #b9adf3, #9e91ea);
      border-radius: 44% 56% 43% 57% / 45% 63% 37% 55%;
      z-index: 8;
    }

    .parietal::after {
      bottom: 102%;
    }

    .parietal::before {
      bottom: 97%;
      border-left: 15px solid transparent;
      border-right: 15px solid transparent;
      border-top: 15px solid rgba(31, 41, 55, 0.96);
    }

    .temporal {
      width: 530px;
      height: 245px;
      left: 270px;
      top: 380px;
      background: linear-gradient(145deg, #add2f6, #86b6e8);
      border-radius: 38% 62% 56% 44% / 42% 43% 67% 58%;
      z-index: 18;
    }

    .temporal::after {
      top: 101%;
    }

    .temporal::before {
      top: 96%;
      border-left: 15px solid transparent;
      border-right: 15px solid transparent;
      border-bottom: 15px solid rgba(31, 41, 55, 0.96);
    }

    .occipital {
      width: 260px;
      height: 255px;
      left: 760px;
      top: 290px;
      background: linear-gradient(145deg, #ffdc76, #f6c84e);
      border-radius: 38% 62% 62% 38% / 47% 48% 65% 52%;
      z-index: 5;
    }

    .occipital::after {
      left: 88%;
      bottom: 105%;
    }

    .occipital::before {
      left: 88%;
      bottom: 100%;
      border-left: 15px solid transparent;
      border-right: 15px solid transparent;
      border-top: 15px solid rgba(31, 41, 55, 0.96);
    }

    .cerebellum {
      width: 290px;
      height: 185px;
      left: 605px;
      top: 540px;
      background: linear-gradient(145deg, #d9d9d9, #b9b9b9);
      border-radius: 58% 42% 55% 45% / 48% 50% 63% 42%;
      transform: rotate(-8deg);
      z-index: 4;
    }

    .cerebellum:hover {
      transform: rotate(-8deg) scale(1.025) translateY(-4px);
    }

    .cerebellum::after {
      top: 105%;
      width: 210px;
    }

    .cerebellum::before {
      top: 98%;
      border-left: 15px solid transparent;
      border-right: 15px solid transparent;
      border-bottom: 15px solid rgba(31, 41, 55, 0.96);
    }

    .legend {
      display: none;
    }

    @media (max-width: 1000px) {
      .top-nav {
        height: auto;
        padding: 18px 20px;
        flex-direction: column;
        gap: 12px;
      }

      .nav-links {
        gap: 16px;
        justify-content: center;
        flex-wrap: wrap;
      }

      .nav-links a {
        padding: 8px 0;
      }

      .nav-links a.active::after {
        bottom: -3px;
      }

      .page {
        padding-top: 55px;
      }

      .hero h1 {
        font-size: 2.2rem;
      }

      .hero p {
        font-size: 1rem;
      }

      .brain-container {
        transform: scale(0.72);
        transform-origin: top center;
        margin-left: 50%;
        translate: -50% 0;
        margin-bottom: -210px;
      }
    }
  </style>
</head>

<body>

  <nav class="top-nav">
    <div class="nav-logo">🧠 Brain Archive</div>

    <div class="nav-links">
      <a href="index.html" class="active">Home</a>
      <a href="basic.html">기초 신경과학</a>
      <a href="anatomy.html">신경해부학</a>
      <a href="cognition.html">감각·인지</a>
      <a href="behavior.html">운동·행동</a>
      <a href="disease.html">뇌질환</a>
      <a href="research.html">연구 아카이브</a>
      <a href="quiz.html">Quiz</a>
    </div>
  </nav>

  <div class="page">

    <div class="hero">
      <h1>🧠 Brain-Structured Research Archive</h1>
      <p>마우스를 올려 각 영역의 기능을 확인하고, 뇌를 정보 처리 시스템으로 탐구하세요</p>
    </div>

    <div class="brain-container">
      <div class="lobe frontal"
           data-tooltip="의사결정, 계획 수립, 감정 조절 및 실행 기능 담당. 전전두피질(PFC)과 보충운동구역(SMA) 포함."
           onclick="location.href='frontal.html'">
        Frontal Lobe
        <span>전두엽</span>
      </div>

      <div class="lobe parietal"
           data-tooltip="감각 정보의 통합, 공간 지각 및 수리적 사고 담당. 일차 체감각 피질(S1) 위치."
           onclick="location.href='parietal.html'">
        Parietal Lobe
        <span>두정엽</span>
      </div>

      <div class="lobe temporal"
           data-tooltip="언어 이해, 청각 처리 및 장기 기억 형성 담당. 해마와 베르니케 영역 관련."
           onclick="location.href='temporal.html'">
        Temporal Lobe
        <span>측두엽</span>
      </div>

      <div class="lobe occipital"
           data-tooltip="시각 정보의 수용 및 해석 담당. 일차 시각 피질(V1)과 시각 연합 영역 위치."
           onclick="location.href='occipital.html'">
        Occipital Lobe
        <span>후두엽</span>
      </div>

      <div class="lobe cerebellum"
           data-tooltip="운동 조정, 균형 유지 및 운동 학습 담당."
           onclick="location.href='cerebellum.html'">
        Cerebellum
        <span>소뇌</span>
      </div>
    </div>

  </div>

</body>
</html>
