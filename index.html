<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Brain Research Archive</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      text-align: center;
    }

    h1 {
      margin-top: 50px;
      font-size: 32px;
    }

    p {
      color: #6b7280;
    }

    .brain {
      width: 600px;
      margin: 60px auto;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 30px;
    }

    .lobe {
      width: 180px;
      height: 140px;
      border-radius: 60% 40% 55% 45% / 50% 60% 40% 50%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-weight: bold;
      cursor: pointer;
      transition: 0.25s;
    }

    .lobe span {
      font-size: 14px;
      font-weight: normal;
    }

    .lobe:hover {
      transform: scale(1.08);
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    }

    /* 색상 */

    .frontal {
      background: #f9a8d4;
    }

    .parietal {
      background: #93c5fd;
    }

    .temporal {
      background: #86efac;
    }

    .occipital {
      background: #fde68a;
    }
  </style>
</head>

<body>

  <h1>🧠 Brain Research Archive</h1>
  <p>뇌 기능을 기준으로 연구를 탐색하세요</p>

  <div class="brain">

    <div class="lobe frontal" onclick="location.href='frontal.html'">
      Frontal Lobe
      <span>전두엽</span>
    </div>

    <div class="lobe parietal" onclick="location.href='parietal.html'">
      Parietal Lobe
      <span>두정엽</span>
    </div>

    <div class="lobe temporal" onclick="location.href='temporal.html'">
      Temporal Lobe
      <span>측두엽</span>
    </div>

    <div class="lobe occipital" onclick="location.href='occipital.html'">
      Occipital Lobe
      <span>후두엽</span>
    </div>

  </div>

</body>
</html>
