<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Brain Research Archive</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      text-align: center;
    }

    h1 {
      margin-top: 40px;
    }

    p {
      color: gray;
    }

    .brain-container {
      position: relative;
      width: 600px;
      margin: 50px auto;
    }

    .brain-img {
      width: 100%;
    }

    /* 클릭 영역 */
    .lobe {
      position: absolute;
      border-radius: 50%;
      border: 2px solid red; /* 위치 확인용 */
      cursor: pointer;
      transition: 0.2s;
    }

    .lobe:hover {
      background: rgba(99,102,241,0.3);
    }

    /* 전두엽 */
    .frontal {
      top: 30%;
      left: 5%;
      width: 25%;
      height: 30%;
    }

    /* 두정엽 */
    .parietal {
      top: 5%;
      left: 30%;
      width: 40%;
      height: 25%;
    }

    /* 측두엽 */
    .temporal {
      top: 45%;
      left: 30%;
      width: 35%;
      height: 20%;
    }

    /* 후두엽 */
    .occipital {
      top: 25%;
      left: 75%;
      width: 18%;
      height: 25%;
    }

    /* 설명 박스 */
    .tooltip {
      position: absolute;
      background: white;
      padding: 10px;
      border-radius: 10px;
      display: none;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
      font-size: 14px;
      pointer-events: none;
    }
  </style>
</head>

<body>

  <h1>🧠 Brain Research Archive</h1>
  <p>뇌 기능을 기준으로 연구를 탐색하세요</p>

  <div class="brain-container">

    <img src="brain.jpg" class="brain-img">

    <!-- 전두엽 -->
    <a href="frontal.html" class="lobe frontal"
       onmousemove="showTip(event, '전두엽<br>Frontal Lobe<br>의사결정 · 사고')"
       onmouseout="hideTip()"></a>

    <!-- 두정엽 -->
    <a href="parietal.html" class="lobe parietal"
       onmousemove="showTip(event, '두정엽<br>Parietal Lobe<br>공간 인식')"
       onmouseout="hideTip()"></a>

    <!-- 측두엽 -->
    <a href="temporal.html" class="lobe temporal"
       onmousemove="showTip(event, '측두엽<br>Temporal Lobe<br>음성 처리')"
       onmouseout="hideTip()"></a>

    <!-- 후두엽 -->
    <a href="occipital.html" class="lobe occipital"
       onmousemove="showTip(event, '후두엽<br>Occipital Lobe<br>시각 처리')"
       onmouseout="hideTip()"></a>

    <div id="tooltip" class="tooltip"></div>

  </div>

  <script>
    function showTip(e, text) {
      const tip = document.getElementById("tooltip");
      tip.innerHTML = text;
      tip.style.display = "block";

      const rect = e.currentTarget.parentElement.getBoundingClientRect();
      tip.style.left = (e.clientX - rect.left + 10) + "px";
      tip.style.top = (e.clientY - rect.top + 10) + "px";
    }

    function hideTip() {
      document.getElementById("tooltip").style.display = "none";
    }
  </script>

</body>
</html>
