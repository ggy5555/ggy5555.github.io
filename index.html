<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brain-Structured Research Archive</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Roboto, Arial, sans-serif;
      background: linear-gradient(180deg, #f5f7fb 0%, #eef2f7 100%);
      text-align: center;
      color: #1f2937;
      overflow-x: hidden;
    }

    .page {
      max-width: 1000px;
      margin: 0 auto;
      padding: 60px 20px;
    }

    .hero h1 {
      margin: 0;
      font-size: 2.5rem;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .hero p {
      margin-top: 12px;
      color: #6b7280;
      font-size: 1.1rem;
    }

    /* 뇌 구조 컨테이너 */
    .brain-container {
      width: 800px;
      height: 500px;
      margin: 50px auto;
      position: relative;
      /* 실제 뇌의 타원형 느낌을 주기 위한 가이드 */
    }

    .lobe {
      position: absolute;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-weight: 800;
      color: #111827;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow:
        inset 0 0 30px rgba(255,255,255,0.3),
        0 10px 20px rgba(0,0,0,0.1);
      text-align: center;
    }

    .lobe span {
      display: block;
      margin-top: 5px;
      font-size: 0.85rem;
      font-weight: 600;
      opacity: 0.8;
    }

    .lobe:hover {
      transform: scale(1.05);
      z-index: 10 !important;
      filter: brightness(1.05);
      box-shadow: 0 15px 30px rgba(0,0,0,0.15);
    }

    /* 실제 해부학적 비율 반영 */
    
    /* 1. 전두엽: 가장 크고 앞쪽 */
    .frontal {
      width: 340px;
      height: 320px;
      left: 50px;
      top: 50px;
      background: linear-gradient(145deg, #efb2d2, #dc94be);
      border-radius: 45% 55% 40% 60% / 60% 45% 55% 40%;
      z-index: 4;
    }

    /* 2. 두정엽: 상단 뒤쪽 */
    .parietal {
      width: 280px;
      height: 220px;
      left: 360px;
      top: 30px;
      background: linear-gradient(145deg, #b6bdf5, #94a0e8);
      border-radius: 50% 50% 40% 60% / 40% 60% 40% 60%;
      z-index: 3;
    }

    /* 3. 측두엽: 중앙 하단 */
    .temporal {
      width: 320px;
      height: 180px;
      left: 280px;
      top: 240px;
      background: linear-gradient(145deg, #b9d1ee, #96b7e2);
      border-radius: 40% 60% 50% 50% / 50% 50% 60% 40%;
      z-index: 5; /* 전두엽/두정엽과 겹치는 부분 위로 */
    }

    /* 4. 후두엽: 맨 뒤쪽 소형 */
    .occipital {
      width: 180px;
      height: 160px;
      left: 580px;
      top: 180px;
      background: linear-gradient(145deg, #f3db73, #e9ca4d);
      border-radius: 40% 60% 60% 40% / 50% 40% 60% 50%;
      z-index: 2;
    }

    .legend {
      margin-top: 40px;
      color: #9ca3af;
      font-size: 0.9rem;
    }

    /* 반응형 대응 */
    @media (max-width: 850px) {
      .brain-container {
        width: 100%;
        height: 400px;
        transform: scale(0.8);
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="hero">
      <h1>🧠 Brain-Structured Research Archive</h1>
      <p>실제 뇌 구조의 기능적 영역에 따른 연구 기록</p>
    </div>

    <div class="brain-container">
      <div class="lobe frontal" onclick="location.href='frontal.html'">
        Frontal Lobe
        <span>전두엽: 사고, 계획, 감정 조절</span>
      </div>

      <div class="lobe parietal" onclick="location.href='parietal.html'">
        Parietal Lobe
        <span>두정엽: 감각 정보 통합, 공간 지각</span>
      </div>

      <div class="lobe temporal" onclick="location.href='temporal.html'">
        Temporal Lobe
        <span>측두엽: 언어 이해, 청각, 기억</span>
      </div>

      <div class="lobe occipital" onclick="location.href='occipital.html'">
        Occipital Lobe
        <span>후두엽: 시각 정보 처리</span>
      </div>
    </div>

    <div class="legend">
      * 각 영역을 클릭하면 해당 뇌 기능과 관련된 연구 문서로 연결됩니다.
    </div>
  </div>
</body>
</html>
