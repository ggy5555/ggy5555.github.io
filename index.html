<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Brain Research Archive</title>

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: linear-gradient(180deg, #f5f7fb 0%, #eef2f7 100%);
      text-align: center;
      color: #1f2937;
    }

    h1 {
      margin-top: 60px;
      font-size: 36px;
      font-weight: 800;
    }

    p {
      color: #6b7280;
      margin-top: 10px;
    }

    /* 🔥 핵심 배치 */

    .brain {
      width: 500px;
      margin: 80px auto;
      position: relative;
    }

    .lobe {
      position: absolute;
      width: 180px;
      height: 140px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-weight: bold;
      border-radius: 60% 40% 55% 45% / 50% 60% 40% 50%;
      cursor: pointer;
      transition: 0.25s;
    }

    .lobe span {
      font-size: 14px;
      font-weight: normal;
    }

    .lobe:hover {
      transform: scale(1.08);
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    }

    /* 🔥 위치 (이게 포인트) */

    .frontal {
      background: #f9a8d4;
      top: 80px;
      left: 20px;
    }

    .parietal {
      background: #93c5fd;
      top: 0px;
      left: 150px;
    }

    .temporal {
      background: #86efac;
      top: 180px;
      left: 170px;
    }

    .occipital {
      background: #fde68a;
      top: 90px;
      left: 320px;
    }

  </style>
</head>

<body>

  <h1>🧠 Brain-Structured Research Archive</h1>
  <p>뇌 기능을 기준으로 정리한 연구 아카이브</p>

  <div class="brain">

    <div class="lobe frontal" onclick="location.href='frontal.html'">
      Frontal Lobe
      <span>전두엽</span>
    </div>

    <div class="lobe parietal" onclick="location.href='parietal.html'">
      Parietal Lobe
      <span>두정엽</span>
    </div>

    <div class="lobe temporal" onclick="location.href='temporal.html'">
      Temporal Lobe
      <span>측두엽</span>
    </div>

    <div class="lobe occipital" onclick="location.href='occipital.html'">
      Occipital Lobe
      <span>후두엽</span>
    </div>

  </div>

</body>
</html>
