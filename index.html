<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brain-Structured Research Archive</title>

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: linear-gradient(180deg, #f5f7fb 0%, #eef2f7 100%);
      text-align: center;
      color: #1f2937;
    }

    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 48px 20px 64px;
    }

    .hero h1 {
      margin: 0;
      font-size: 2.4rem;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .hero p {
      margin-top: 12px;
      color: #6b7280;
      font-size: 1rem;
    }

    .brain {
      width: 760px;
      height: 470px;
      margin: 80px auto 0;
      position: relative;
    }

    .lobe {
      position: absolute;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-weight: 800;
      font-size: 1rem;
      color: #111827;
      cursor: pointer;
      transition: transform 0.25s ease, box-shadow 0.25s ease, filter 0.25s ease;
      border-radius: 58% 42% 63% 37% / 40% 60% 40% 60%;
      box-shadow:
        inset 0 0 30px rgba(255,255,255,0.35),
        0 10px 24px rgba(0,0,0,0.12);
      transform: rotate(-3deg);
    }

    .lobe span {
      display: block;
      margin-top: 10px;
      font-size: 14px;
      font-weight: 600;
    }

    .lobe:hover {
      transform: rotate(-3deg) scale(1.08);
      filter: brightness(1.04);
      box-shadow:
        inset 0 0 30px rgba(255,255,255,0.4),
        0 14px 28px rgba(0,0,0,0.16);
    }

    .frontal {
      background: #f9a8d4;
      width: 210px;
      height: 170px;
      left: 120px;
      top: 200px;
      z-index: 2;
    }

    .parietal {
      background: #93c5fd;
      width: 240px;
      height: 190px;
      left: 260px;
      top: 100px;
      z-index: 3;
    }

    .temporal {
      background: #86efac;
      width: 240px;
      height: 150px;
      left: 260px;
      top: 260px;
      z-index: 2;
    }

    .occipital {
      background: #fde68a;
      width: 190px;
      height: 160px;
      left: 460px;
      top: 200px;
      z-index: 1;
    }

    .legend {
      margin-top: 18px;
      color: #6b7280;
      font-size: 0.95rem;
    }

    @media (max-width: 860px) {
      .brain {
        width: 92vw;
        height: 62vw;
        max-height: 470px;
      }

      .lobe {
        font-size: 0.9rem;
      }

      .lobe span {
        font-size: 12px;
      }

      .frontal {
        left: 10%;
        top: 43%;
        width: 28%;
        height: 30%;
      }

      .parietal {
        left: 30%;
        top: 18%;
        width: 31%;
        height: 34%;
      }

      .temporal {
        left: 31%;
        top: 55%;
        width: 31%;
        height: 24%;
      }

      .occipital {
        left: 60%;
        top: 42%;
        width: 24%;
        height: 28%;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="hero">
      <h1>🧠 Brain-Structured Research Archive</h1>
      <p>뇌 기능을 기준으로 정리한 연구 아카이브</p>
    </div>

    <div class="brain">
      <div class="lobe frontal" onclick="location.href='frontal.html'">
        Frontal Lobe
        <span>전두엽</span>
      </div>

      <div class="lobe parietal" onclick="location.href='parietal.html'">
        Parietal Lobe
        <span>두정엽</span>
      </div>

      <div class="lobe temporal" onclick="location.href='temporal.html'">
        Temporal Lobe
        <span>측두엽</span>
      </div>

      <div class="lobe occipital" onclick="location.href='occipital.html'">
        Occipital Lobe
        <span>후두엽</span>
      </div>
    </div>

    <div class="legend">
      각 영역을 클릭하면 해당 연구 페이지로 이동합니다.
    </div>
  </div>
</body>
</html>
