<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brain-Structured Research Archive</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Roboto, Arial, sans-serif;
      background: linear-gradient(180deg, #f5f7fb 0%, #eef2f7 100%);
      text-align: center;
      color: #1f2937;
    }

    .page {
      max-width: 1000px;
      margin: 0 auto;
      padding: 60px 20px;
    }

    .hero h1 {
      margin: 0;
      font-size: 2.5rem;
      font-weight: 800;
    }

    .brain-container {
      width: 850px;
      height: 550px;
      margin: 40px auto;
      position: relative;
    }

    .lobe {
      position: absolute;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-weight: 800;
      color: #111827;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: inset 0 0 30px rgba(255,255,255,0.3), 0 10px 20px rgba(0,0,0,0.1);
      text-align: center;
    }

    .lobe span {
      display: block;
      margin-top: 5px;
      font-size: 0.85rem;
      font-weight: 600;
      opacity: 0.8;
    }

    .lobe:hover {
      transform: scale(1.05) translateY(-5px);
      z-index: 30 !important;
      filter: brightness(1.05);
    }

    /* 전두엽: 사진 비율에 맞춰 크게 확장 */
    .frontal {
      width: 400px;
      height: 350px;
      left: 20px;
      top: 50px;
      background: linear-gradient(145deg, #efb2d2, #dc94be);
      border-radius: 50% 50% 40% 60% / 65% 45% 45% 55%;
      z-index: 10;
    }

    /* 두정엽 */
    .parietal {
      width: 320px;
      height: 250px;
      left: 360px;
      top: 30px;
      background: linear-gradient(145deg, #b6bdf5, #94a0e8);
      border-radius: 40% 60% 40% 60% / 40% 70% 30% 60%;
      z-index: 5;
    }

    /* 측두엽 */
    .temporal {
      width: 350px;
      height: 200px;
      left: 260px;
      top: 260px;
      background: linear-gradient(145deg, #b9d1ee, #96b7e2);
      border-radius: 30% 70% 60% 40% / 40% 40% 70% 60%;
      z-index: 15; /* 전두엽/두정엽 경계 위로 */
    }

    /* 후두엽 */
    .occipital {
      width: 200px;
      height: 180px;
      left: 600px;
      top: 200px;
      background: linear-gradient(145deg, #f3db73, #e9ca4d);
      border-radius: 30% 70% 70% 30% / 50% 50% 70% 50%;
      z-index: 2;
    }

    /* 소뇌: 후하단 배치 강화 */
    .cerebellum {
      width: 190px;
      height: 120px;
      left: 550px;
      top: 360px; /* 위치를 더 잘 보이게 조정 */
      background: linear-gradient(145deg, #d1d5db, #9ca3af);
      border-radius: 60% 40% 50% 50% / 50% 50% 60% 40%;
      transform: rotate(-10deg);
      z-index: 1; /* 후두엽/측두엽 뒤쪽 바닥 */
      font-size: 0.9rem;
    }

    .legend {
      margin-top: 20px;
      color: #9ca3af;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="hero">
      <h1>🧠 Brain-Structured Research Archive</h1>
      <p>뇌의 해부학적 구조를 따르는 연구 아카이브</p>
    </div>

    <div class="brain-container">
      <div class="lobe frontal" onclick="location.href='frontal.html'">
        Frontal Lobe
        <span>전두엽</span>
      </div>

      <div class="lobe parietal" onclick="location.href='parietal.html'">
        Parietal Lobe
        <span>두정엽</span>
      </div>

      <div class="lobe temporal" onclick="location.href='temporal.html'">
        Temporal Lobe
        <span>측두엽</span>
      </div>

      <div class="lobe occipital" onclick="location.href='occipital.html'">
        Occipital Lobe
        <span>후두엽</span>
      </div>

      <div class="lobe cerebellum" onclick="location.href='cerebellum.html'">
        Cerebellum
        <span>소뇌</span>
      </div>
    </div>

    <div class="legend">
      * 각 영역은 실제 뇌의 기능적 비중에 맞춰 배치되었습니다.
    </div>
  </div>
</body>
</html>
