<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Brain-Structured Research Archive</title>

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: linear-gradient(180deg, #f5f7fb 0%, #eef2f7 100%);
      text-align: center;
      color: #1f2937;
    }

    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 48px 20px 64px;
    }

    .hero h1 {
      margin: 0;
      font-size: 2.4rem;
      font-weight: 800;
    }

    .hero p {
      margin-top: 10px;
      color: #6b7280;
    }

    .brain {
      width: 650px;
      height: 420px;
      margin: 80px auto 0;
      position: relative;
    }

    .lobe {
      position: absolute;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-weight: 800;
      cursor: pointer;
      transition: 0.25s;

      /* 🔥 핵심: 더 뇌같은 형태 */
      border-radius: 63% 37% 54% 46% / 45% 65% 35% 55%;

      box-shadow: 
        inset 0 0 30px rgba(255,255,255,0.35),
        0 10px 25px rgba(0,0,0,0.12);
    }

    .lobe span {
      font-size: 14px;
      font-weight: 600;
      margin-top: 8px;
    }

    .lobe:hover {
      transform: scale(1.08);
      filter: brightness(1.05);
    }

    /* 🔥 더 겹치게 배치 */

    .frontal {
      background: #f9a8d4;
      width: 210px;
      height: 170px;
      left: 90px;
      top: 140px;
      z-index: 2;
    }

    .parietal {
      background: #93c5fd;
      width: 230px;
      height: 180px;
      left: 230px;
      top: 60px;
      z-index: 3;
    }

    .temporal {
      background: #86efac;
      width: 230px;
      height: 150px;
      left: 240px;
      top: 230px;
      z-index: 2;
    }

    .occipital {
      background: #fde68a;
      width: 190px;
      height: 160px;
      left: 430px;
      top: 150px;
      z-index: 1;
    }

    .legend {
      margin-top: 20px;
      color: #6b7280;
      font-size: 0.95rem;
    }
  </style>
</head>

<body>
  <div class="page">

    <div class="hero">
      <h1>🧠 Brain-Structured Research Archive</h1>
      <p>뇌 기능을 기준으로 정리한 연구 아카이브</p>
    </div>

    <div class="brain">

      <div class="lobe frontal" onclick="location.href='frontal.html'">
        Frontal Lobe
        <span>전두엽</span>
      </div>

      <div class="lobe parietal" onclick="location.href='parietal.html'">
        Parietal Lobe
        <span>두정엽</span>
      </div>

      <div class="lobe temporal" onclick="location.href='temporal.html'">
        Temporal Lobe
        <span>측두엽</span>
      </div>

      <div class="lobe occipital" onclick="location.href='occipital.html'">
        Occipital Lobe
        <span>후두엽</span>
      </div>

    </div>

    <div class="legend">
      각 영역을 클릭하면 해당 연구 페이지로 이동합니다.
    </div>

  </div>
</body>
</html>
