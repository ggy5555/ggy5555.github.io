<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brain-Structured Research Archive</title>

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Roboto, "Apple SD Gothic Neo", sans-serif;
      background: linear-gradient(180deg, #f5f7fb 0%, #eef2f7 100%);
      text-align: center;
      color: #1f2937;
      min-height: 100vh;
    }

    .page {
      max-width: 1000px;
      margin: 0 auto;
      padding: 60px 20px;
    }

    .hero h1 {
      margin: 0;
      font-size: 2.5rem;
      font-weight: 800;
    }

    .brain-container {
      width: 850px;
      height: 550px;
      margin: 60px auto;
      position: relative;
    }

    .lobe {
      position: absolute;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-weight: 800;
      color: #111827;
      cursor: pointer;
      text-align: center;

      /* 모양 유지 */
      box-shadow:
        inset 0 0 30px rgba(255,255,255,0.3),
        0 10px 20px rgba(0,0,0,0.1);
    }

    .lobe span {
      display: block;
      margin-top: 5px;
      font-size: 0.9rem;
      font-weight: 600;
      opacity: 0.8;
    }

    /* 🔥 툴팁 (핵심) */
    .lobe::after {
      content: attr(data-tooltip);
      position: absolute;
      bottom: 112%;
      left: 50%;
      transform: translateX(-50%);
      width: 240px;
      padding: 14px 16px;
      background: rgba(17, 24, 39, 0.96);
      color: #f9fafb;
      font-size: 0.84rem;
      font-weight: 500;
      border-radius: 12px;
      visibility: hidden;
      opacity: 0;
      transition: opacity 0.2s ease;
      z-index: 100;
      pointer-events: none;
      line-height: 1.6;
      box-shadow: 0 14px 28px rgba(0,0,0,0.18);
      white-space: normal;
      text-align: left;
    }

    /* 말풍선 꼬리 */
    .lobe::before {
      content: "";
      position: absolute;
      bottom: 104%;
      left: 50%;
      transform: translateX(-50%);
      border-width: 8px;
      border-style: solid;
      border-color: rgba(17, 24, 39, 0.96) transparent transparent transparent;
      visibility: hidden;
      opacity: 0;
      transition: opacity 0.2s ease;
      z-index: 99;
      pointer-events: none;
    }

    .lobe:hover::after,
    .lobe:hover::before {
      visibility: visible;
      opacity: 1;
    }

    /* ===== 영역 ===== */

    .frontal {
      width: 390px;
      height: 350px;
      left: 20px;
      top: 50px;
      background: linear-gradient(145deg, #efb2d2, #dc94be);
      border-radius: 50% 50% 40% 60% / 65% 45% 45% 55%;
      z-index: 10;
    }

    .parietal {
      width: 320px;
      height: 250px;
      left: 360px;
      top: 30px;
      background: linear-gradient(145deg, #b6bdf5, #94a0e8);
      border-radius: 40% 60% 40% 60% / 40% 70% 30% 60%;
      z-index: 5;
    }

    .temporal {
      width: 350px;
      height: 200px;
      left: 260px;
      top: 260px;
      background: linear-gradient(145deg, #b9d1ee, #96b7e2);
      border-radius: 30% 70% 60% 40% / 40% 40% 70% 60%;
      z-index: 15;
    }

    .occipital {
      width: 200px;
      height: 180px;
      left: 600px;
      top: 200px;
      background: linear-gradient(145deg, #f3db73, #e9ca4d);
      border-radius: 30% 70% 70% 30% / 50% 50% 70% 50%;
      z-index: 2;
    }

    .cerebellum {
      width: 190px;
      height: 120px;
      left: 550px;
      top: 370px;
      background: linear-gradient(145deg, #d1d5db, #9ca3af);
      border-radius: 60% 40% 50% 50% / 50% 50% 60% 40%;
      transform: rotate(-10deg);
      z-index: 1;
    }

    .legend {
      margin-top: 40px;
      color: #9ca3af;
      font-size: 0.9rem;
    }

  </style>
</head>

<body>
  <div class="page">

    <div class="hero">
      <h1>🧠 Brain-Structured Research Archive</h1>
      <p>마우스를 올려 각 영역의 기능을 확인하세요</p>
    </div>

    <div class="brain-container">

      <div class="lobe frontal"
           data-tooltip="전두엽: 의사결정, 계획, 감정 조절을 담당합니다. 전전두피질(PFC) 포함."
           onclick="location.href='frontal.html'">
        Frontal Lobe
        <span>전두엽</span>
      </div>

      <div class="lobe parietal"
           data-tooltip="두정엽: 감각 정보 통합, 공간 지각, 수리적 사고 담당."
           onclick="location.href='parietal.html'">
        Parietal Lobe
        <span>두정엽</span>
      </div>

      <div class="lobe temporal"
           data-tooltip="측두엽: 청각 처리, 언어 이해, 장기 기억 형성 담당."
           onclick="location.href='temporal.html'">
        Temporal Lobe
        <span>측두엽</span>
      </div>

      <div class="lobe occipital"
           data-tooltip="후두엽: 시각 정보 처리 및 해석 담당. (V1 포함)"
           onclick="location.href='occipital.html'">
        Occipital Lobe
        <span>후두엽</span>
      </div>

      <div class="lobe cerebellum"
           data-tooltip="소뇌: 운동 조절, 균형 유지, 운동 학습 담당."
           onclick="location.href='cerebellum.html'">
        Cerebellum
        <span>소뇌</span>
      </div>

    </div>

    <div class="legend">
      * 각 영역을 클릭하면 해당 연구 페이지로 이동합니다.
    </div>

  </div>
</body>
</html>
