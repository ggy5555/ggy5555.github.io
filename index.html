<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brain-Structured Research Archive</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: linear-gradient(180deg, #f5f7fb 0%, #eef2f7 100%);
      color: #1f2937;
      text-align: center;
    }

    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 48px 20px 64px;
    }

    .hero h1 {
      margin: 0;
      font-size: 2.4rem;
      font-weight: 800;
    }

    .hero p {
      margin: 12px 0 0;
      color: #4b5563;
    }

    /* 🔥 brain 대신 버튼 영역 */

    .brain {
      width: 600px;
      margin: 60px auto;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 30px;
    }

    .lobe {
      width: 180px;
      height: 140px;
      border-radius: 60% 40% 55% 45% / 50% 60% 40% 50%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-weight: bold;
      cursor: pointer;
      transition: 0.25s;
      color: #111827;
    }

    .lobe span {
      font-size: 14px;
      font-weight: normal;
    }

    .lobe:hover {
      transform: scale(1.08);
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    }

    /* 색깔 */

    .frontal {
      background: #f9a8d4;
    }

    .parietal {
      background: #93c5fd;
    }

    .temporal {
      background: #86efac;
    }

    .occipital {
      background: #fde68a;
    }

    .legend {
      margin-top: 20px;
      color: #6b7280;
      font-size: 0.95rem;
    }
  </style>
</head>

<body>
  <div class="page">

    <div class="hero">
      <h1>🧠 Brain-Structured Research Archive</h1>
      <p>뇌 기능을 기준으로 연구를 탐색하세요</p>
    </div>

    <!-- 🔥 이미지 대신 버튼 -->

    <div class="brain">

      <div class="lobe frontal" onclick="location.href='frontal.html'">
        Frontal Lobe
        <span>전두엽</span>
      </div>

      <div class="lobe parietal" onclick="location.href='parietal.html'">
        Parietal Lobe
        <span>두정엽</span>
      </div>

      <div class="lobe temporal" onclick="location.href='temporal.html'">
        Temporal Lobe
        <span>측두엽</span>
      </div>

      <div class="lobe occipital" onclick="location.href='occipital.html'">
        Occipital Lobe
        <span>후두엽</span>
      </div>

    </div>

    <div class="legend">
      각 영역을 클릭하면 해당 연구 페이지로 이동합니다.
    </div>

  </div>
</body>
</html>
