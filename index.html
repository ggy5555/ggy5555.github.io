<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brain-Structured Research Archive</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Roboto, Arial, sans-serif;
      background: linear-gradient(180deg, #f5f7fb 0%, #eef2f7 100%);
      text-align: center;
      color: #1f2937;
    }

    .page {
      max-width: 1000px;
      margin: 0 auto;
      padding: 60px 20px;
    }

    .hero h1 {
      margin: 0;
      font-size: 2.5rem;
      font-weight: 800;
    }

    .brain-container {
      width: 850px;
      height: 550px;
      margin: 40px auto;
      position: relative;
    }

    .lobe {
      position: absolute;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-weight: 800;
      color: #111827;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: inset 0 0 30px rgba(255,255,255,0.3), 0 10px 20px rgba(0,0,0,0.1);
      text-align: center;
    }

    .lobe span {
      display: block;
      margin-top: 5px;
      font-size: 0.85rem;
      font-weight: 600;
      opacity: 0.8;
    }

    .lobe:hover {
      transform: scale(1.05) translateY(-5px);
      z-index: 20 !important;
      filter: brightness(1.05);
    }

    /* 전두엽: 사진처럼 앞부분이 크고 둥근 형태 */
    .frontal {
      width: 380px;
      height: 340px;
      left: 30px;
      top: 60px;
      background: linear-gradient(145deg, #efb2d2, #dc94be);
      border-radius: 55% 45% 40% 50% / 60% 50% 40% 50%;
      z-index: 5;
    }

    /* 두정엽: 상단 중앙-뒤쪽 */
    .parietal {
      width: 300px;
      height: 240px;
      left: 380px;
      top: 35px;
      background: linear-gradient(145deg, #b6bdf5, #94a0e8);
      border-radius: 50% 60% 40% 50% / 50% 70% 40% 50%;
      z-index: 3;
    }

    /* 측두엽: 전두엽/두정엽 아래 위치 */
    .temporal {
      width: 340px;
      height: 180px;
      left: 280px;
      top: 260px;
      background: linear-gradient(145deg, #b9d1ee, #96b7e2);
      border-radius: 30% 70% 60% 40% / 40% 40% 70% 60%;
      z-index: 6;
    }

    /* 후두엽: 맨 뒤쪽 */
    .occipital {
      width: 190px;
      height: 170px;
      left: 610px;
      top: 210px;
      background: linear-gradient(145deg, #f3db73, #e9ca4d);
      border-radius: 30% 70% 70% 30% / 50% 50% 70% 50%;
      z-index: 2;
    }

    /* 소뇌: 후두엽 아래 하단부 */
    .cerebellum {
      width: 180px;
      height: 110px;
      left: 540px;
      top: 360px;
      background: linear-gradient(145deg, #d1d5db, #9ca3af);
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      z-index: 1;
      font-size: 0.9rem;
    }

    .legend {
      margin-top: 20px;
      color: #9ca3af;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="hero">
      <h1>🧠 Brain-Structured Research Archive</h1>
      <p>해부학적 구조를 반영한 통합 연구 아카이브</p>
    </div>

    <div class="brain-container">
      <div class="lobe frontal" onclick="location.href='frontal.html'">
        Frontal Lobe
        <span>전두엽</span>
      </div>

      <div class="lobe parietal" onclick="location.href='parietal.html'">
        Parietal Lobe
        <span>두정엽</span>
      </div>

      <div class="lobe temporal" onclick="location.href='temporal.html'">
        Temporal Lobe
        <span>측두엽</span>
      </div>

      <div class="lobe occipital" onclick="location.href='occipital.html'">
        Occipital Lobe
        <span>후두엽</span>
      </div>

      <div class="lobe cerebellum" onclick="location.href='cerebellum.html'">
        Cerebellum
        <span>소뇌</span>
      </div>
    </div>

    <div class="legend">
      * 각 영역을 클릭하면 해당 부위의 특성에 맞게 분류된 연구 데이터로 이동합니다.
    </div>
  </div>
</body>
</html>
